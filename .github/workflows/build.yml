name: Build LGX

on:
  push:
    branches: [master]
    tags: ["v*"]
  pull_request:
    branches: [master]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: cachix/install-nix-action@v27
        with:
          nix_path: nixpkgs=channel:nixos-unstable
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install lgs (logos-scaffold, feature/basecamp branch)
        # `basecamp` is not yet on master; it lives on the feature/basecamp
        # branch in logos-co/logos-scaffold. Pin explicitly until it merges.
        run: cargo install --git https://github.com/logos-co/logos-scaffold.git --branch feature/basecamp --locked logos-scaffold

      - name: lgs basecamp setup
        # Required for `install` (seeds alice/bob profiles + pinned
        # basecamp + lgpm).
        run: lgs basecamp setup

      - name: Capture project modules
        run: lgs basecamp modules

      - name: Build dev LGX (both modules, via lgs basecamp install)
        # Leaves `result-lgx/` symlinks next to each sibling flake.
        run: lgs basecamp install --print-output

      - name: Build portable LGX (both modules, via lgs basecamp build-portable)
        # Leaves `result-lgx-portable/` symlinks next to each sibling flake.
        run: lgs basecamp build-portable

      - name: Stage artifacts
        # Only the portable variant is shipped. Dev `.lgx` is built in the
        # previous step to validate that the non-portable flake works, but
        # it depends on the host Nix store and isn't useful to end users.
        run: |
          set -euo pipefail
          mkdir -p dist
          for d in logos-tictactoe-solo-ai logos-tictactoe-ui; do
            cp -v "$d/result-lgx-portable"/*.lgx dist/
          done
          ls -la dist/

      - name: Upload LGX bundle
        uses: actions/upload-artifact@v4
        with:
          name: tictactoe-lgx-bundle
          path: dist/*.lgx

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: tictactoe-lgx-bundle
          path: dist

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.lgx
          generate_release_notes: true
